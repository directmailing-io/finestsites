<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 800px;
  background: linear-gradient(145deg, #E8F0EB 0%, #F0F5F1 55%, #E4EDE8 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}
.frame {
  width: 1060px;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(20,40,25,0.22), 0 8px 32px rgba(20,40,25,0.10);
}
.chrome {
  background: #EFEDED; padding: 11px 16px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #DCDADA;
}
.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.url {
  flex:1; background: #FAF9F9; border: 1px solid #E0DEDE; border-radius: 6px;
  padding: 5px 12px; font-size: 11.5px; color: #777; text-align: center;
}
img.shot {
  width: 100%; display: block;
  height: 755px; object-fit: cover; object-position: top center;
}
</style>
</head>
<body>
<div class="frame">
  <div class="chrome">
    <div class="dot" style="background:#FF5F57;"></div>
    <div class="dot" style="background:#FEBC2E;"></div>
    <div class="dot" style="background:#28C840;"></div>
    <div class="url">demo.womenplus.io</div>
  </div>
  <img class="shot" src="file:///Users/kurzeja/new-finestsites/marketing/womenplus-scans/raw-quality-2.png" />
</div>
</body>
</html>
