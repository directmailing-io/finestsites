<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 900px;
  background: #fff;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.img-wrap {
  width: 520px;
  height: 860px;
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 8px 60px rgba(0,0,0,0.22), 0 2px 16px rgba(0,0,0,0.10);
}
img.shot {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.gradient-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="img-wrap">
  <img class="shot" src="file:///Users/kurzeja/new-finestsites/marketing/womenplus-scans/raw-video-player-v2.png" />
  <div class="gradient-fade"></div>
</div>
</body>
</html>
