<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1200px; height: 900px;
  background: #F0EBF8;
  overflow: hidden;
  position: relative;
}
.img-wrap {
  width: 100%;
  height: 100%;
  position: relative;
}
img.shot {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.gradient-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(to bottom, rgba(240,235,248,0) 0%, rgba(240,235,248,0.7) 55%, #F0EBF8 100%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="img-wrap">
  <img class="shot" src="file:///Users/kurzeja/new-finestsites/marketing/womenplus-scans/raw-cases-warum.png" />
  <div class="gradient-fade"></div>
</div>
</body>
</html>
