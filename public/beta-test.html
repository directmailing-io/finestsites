<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinestSites – Beta-Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F5F7;
  --card: #fff;
  --border: #E5E7EB;
  --text: #1D1D1F;
  --muted: #6E6E73;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --radius: 18px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 16px 80px;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 660px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  margin-bottom: 28px;
}
.logo-wrap { margin-bottom: 18px; }
.logo-wrap img { height: 28px; }
.header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.header p {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.5;
  max-width: 440px;
  margin: 0 auto;
}

/* Name card */
.name-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.name-card label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
.name-card input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: #FAFAFA;
  outline: none;
  transition: border-color 0.15s;
}
.name-card input:focus { border-color: #1a1a1a; background: #fff; }
.name-card input::placeholder { color: #C0C0C5; }

/* Legend */
.legend {
  display: flex;
  align-items: center;
  gap: 20px;
  justify-content: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--muted);
}

/* Category */
.category {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
}
.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.cat-header:hover { background: #FAFAFA; }
.cat-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.cat-title { flex: 1; }
.cat-title h2 { font-size: 14px; font-weight: 600; }
.cat-title p { font-size: 12px; color: var(--muted); margin-top: 1px; }
.cat-stat {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.cat-chevron {
  color: #C0C0C5;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.category.open .cat-chevron { transform: rotate(180deg); }

.cat-body { display: none; }
.category.open .cat-body { display: block; }

/* Item */
.item {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0;
  border-top: 1px solid #F3F4F6;
  min-height: 56px;
}
.item-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  padding: 12px 20px;
  cursor: pointer;
  min-width: 0;
}
.item-left:hover { background: #FAFAFA; }

/* Status button — cycle through states */
.status-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid #D1D5DB;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.status-btn.ok {
  background: #34C759;
  border-color: #34C759;
}
.status-btn.issue {
  background: transparent;
  border-color: #F97316;
  border-width: 2.5px;
}
/* Inner dot for issue */
.status-btn .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #F97316;
  display: none;
}
.status-btn.issue .dot { display: block; }
.status-btn .check { display: none; }
.status-btn.ok .check { display: block; }

.item-text { flex: 1; min-width: 0; }
.item-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
}

/* Testers sidebar */
.item-testers {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  padding: 10px 16px 10px 8px;
  flex-shrink: 0;
  min-width: 110px;
  max-width: 140px;
}
.tester-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tester-tag.ok {
  background: #F0FDF4;
  color: #16A34A;
}
.tester-tag.issue {
  background: #FFF7ED;
  color: #C2410C;
}

/* Status dot inline */
.dot-ok {
  width: 7px; height: 7px; border-radius: 50%;
  background: #34C759; flex-shrink: 0;
}
.dot-issue {
  width: 7px; height: 7px; border-radius: 50%;
  background: #F97316; flex-shrink: 0;
}

/* Submit */
.submit-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-top: 20px;
  text-align: center;
}
.submit-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
.submit-card p { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px; border-radius: 12px;
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: #1a1a1a; color: #fff; }
.btn-primary:hover { background: #333; transform: translateY(-1px); }
.btn-secondary { background: #F3F4F6; color: var(--text); margin-left: 8px; }
.btn-secondary:hover { background: #E5E7EB; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1a1a1a; color: #fff;
  padding: 12px 20px; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Sync indicator */
.sync {
  text-align: center;
  font-size: 12px;
  color: #C0C0C5;
  margin-top: 10px;
}
.sync.syncing { color: #F97316; }
.sync.synced { color: #34C759; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 20px; padding: 28px;
  max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  max-height: 80vh; overflow-y: auto;
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.result-box {
  background: #F9FAFB; border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; font-size: 12px; font-family: monospace;
  line-height: 1.7; color: #374151; white-space: pre-wrap;
  max-height: 220px; overflow-y: auto; margin-bottom: 16px;
}
.modal-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.copy-ok { font-size: 13px; color: #16A34A; font-weight: 500; margin-top: 8px; display: none; }
.copy-ok.show { display: block; }

@media (max-width: 520px) {
  .item-testers { min-width: 80px; max-width: 100px; }
  .name-card { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-wrap">
      <img src="/logos/logo-black.svg" alt="FinestSites" />
    </div>
    <h1>Beta-Test</h1>
    <p>Hake ab, was du getestet hast. Alles geklappt? Grüner Haken. Hatte etwas komisch gewirkt? Orange. Mehr nicht.</p>
  </div>

  <div class="name-card">
    <label>Dein Name:</label>
    <input type="text" id="testerName" placeholder="z. B. Lena" autocomplete="off" />
  </div>

  <div class="legend">
    <div class="legend-item">
      <div style="width:22px;height:22px;border-radius:50%;background:#34C759;display:flex;align-items:center;justify-content:center;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      Hat geklappt
    </div>
    <div class="legend-item">
      <div style="width:22px;height:22px;border-radius:50%;border:2.5px solid #F97316;display:flex;align-items:center;justify-content:center;">
        <div style="width:8px;height:8px;border-radius:50%;background:#F97316;"></div>
      </div>
      Gab Probleme / war komisch
    </div>
    <div class="legend-item">
      <div style="width:22px;height:22px;border-radius:50%;border:2px solid #D1D5DB;"></div>
      Noch nicht getestet
    </div>
  </div>

  <div id="categories"></div>

  <div class="submit-card">
    <h3>Fertig?</h3>
    <p>Klick auf Teilen, dann bekomme ich deine Ergebnisse.</p>
    <button class="btn btn-primary" onclick="submitResults()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
        <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      Meine Ergebnisse teilen
    </button>
  </div>

  <div class="sync" id="syncStatus">Letzte Aktualisierung: —</div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── CHECKLIST DATA ───────────────────────────────────────────────────────────
const CATS = [
  {
    id: 'account', icon: '👤', color: '#EFF6FF',
    title: 'Anmelden & Account',
    desc: 'Registrieren, einloggen, Passwort',
    items: [
      { id: 'reg', title: 'Konto erstellt (Registrierung abgeschlossen)' },
      { id: 'email_confirm', title: 'Bestätigungs-E-Mail ist angekommen' },
      { id: 'username', title: 'Benutzernamen gewählt (z. B. @deinname)' },
      { id: 'logout_login', title: 'Ausgeloggt und wieder eingeloggt' },
      { id: 'pw_forgot', title: '"Passwort vergessen" benutzt – E-Mail kam an' },
      { id: 'pw_reset', title: 'Neues Passwort gesetzt und danach eingeloggt' },
      { id: 'pw_change', title: 'Passwort in den Einstellungen geändert' },
    ]
  },
  {
    id: 'plan', icon: '💳', color: '#F5F3FF',
    title: 'Plan & Bezahlen',
    desc: 'Tarif buchen, bezahlen, kündigen',
    items: [
      { id: 'plan_seen', title: 'Planauswahl gesehen (nach der Registrierung)' },
      { id: 'plan_bought', title: 'Bezahlten Tarif gebucht (mit Karte oder SEPA)' },
      { id: 'plan_invoice', title: 'Rechnung per E-Mail erhalten' },
      { id: 'plan_portal', title: '"Abo verwalten" geöffnet (Stripe-Seite)' },
      { id: 'plan_cancel', title: 'Abo gekündigt – hat funktioniert' },
      { id: 'plan_email_cancel', title: 'Kündigungsbestätigung per E-Mail erhalten' },
    ]
  },
  {
    id: 'website', icon: '🌐', color: '#F0FDF4',
    title: 'Webseite erstellen',
    desc: 'Vorlage wählen, bearbeiten, veröffentlichen',
    items: [
      { id: 'tmpl_browse', title: 'Vorlagen angeschaut (Template-Bibliothek)' },
      { id: 'tmpl_preview', title: 'Vorschau einer Vorlage angesehen' },
      { id: 'tmpl_pick', title: 'Eine Vorlage ausgewählt und Website erstellt' },
      { id: 'editor_open', title: 'Editor geöffnet – Inhalte waren sichtbar' },
      { id: 'editor_edit', title: 'Texte geändert und gespeichert' },
      { id: 'editor_img', title: 'Eigenes Bild hochgeladen' },
      { id: 'preview', title: 'Vorschau der eigenen Seite angesehen' },
      { id: 'publish', title: 'Webseite veröffentlicht (Live geschaltet)' },
      { id: 'live_open', title: 'Veröffentlichte Seite im Browser geöffnet' },
      { id: 'edit_after', title: 'Inhalte nach dem Veröffentlichen geändert – Änderung war sofort live' },
    ]
  },
  {
    id: 'domain', icon: '🔗', color: '#FFF7ED',
    title: 'Eigene Domain verknüpfen',
    desc: 'Optional – nur wenn du eine Domain hast',
    items: [
      { id: 'dom_enter', title: 'Eigene Domain eingetragen' },
      { id: 'dom_dns', title: 'DNS-Einstellungen gemacht (beim Domain-Anbieter)' },
      { id: 'dom_ssl', title: 'HTTPS hat funktioniert (Schloss im Browser)' },
      { id: 'dom_live', title: 'Webseite über eigene Domain erreichbar' },
    ]
  },
  {
    id: 'form', icon: '📬', color: '#FEF9C3',
    title: 'Kontaktformular',
    desc: 'Anfrage abschicken und empfangen',
    items: [
      { id: 'form_send', title: 'Testanfrage über das Formular auf der Webseite abgeschickt' },
      { id: 'form_inbox', title: 'Anfrage im Dashboard unter "Anfragen" gesehen' },
      { id: 'form_email', title: 'Benachrichtigung per E-Mail bekommen' },
    ]
  },
  {
    id: 'support', icon: '💬', color: '#F0F9FF',
    title: 'Support-Chat',
    desc: 'Chatten, Antwort bekommen',
    items: [
      { id: 'chat_open', title: 'Support-Chat geöffnet (über den Button links)' },
      { id: 'chat_msg', title: 'Nachricht geschrieben und abgeschickt' },
      { id: 'chat_reply', title: 'Antwort vom Support erhalten' },
      { id: 'chat_badge', title: 'Neue-Nachricht-Anzeige (Zahl) ist erschienen' },
    ]
  },
  {
    id: 'misc', icon: '📱', color: '#F9FAFB',
    title: 'Sonstiges',
    desc: 'Handy, Einstellungen, Abmelden',
    items: [
      { id: 'mobile_app', title: 'Dashboard auf dem Handy aufgerufen – sah gut aus' },
      { id: 'mobile_site', title: 'Eigene Webseite auf dem Handy geprüft' },
      { id: 'settings', title: 'Einstellungen aufgerufen' },
      { id: 'logout', title: 'Erfolgreich abgemeldet' },
    ]
  },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
const LS_KEY = 'fs_beta_v2';
let myState = { name: '', items: {} }; // { [id]: 'ok' | 'issue' | null }
let allTesters = []; // from server

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) myState = { ...myState, ...JSON.parse(raw) };
  } catch {}
}
function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(myState)); } catch {}
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('categories');
  el.innerHTML = '';
  CATS.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category' + (ci === 0 ? ' open' : '');
    div.id = 'cat_' + cat.id;

    const okCount = cat.items.filter(it => myState.items[it.id]).length;

    div.innerHTML = `
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-icon" style="background:${cat.color}">${cat.icon}</div>
        <div class="cat-title">
          <h2>${cat.title}</h2>
          <p>${cat.desc}</p>
        </div>
        <div class="cat-stat">
          <span style="color:${okCount===cat.items.length&&okCount>0?'#16A34A':'var(--muted)'}">${okCount}/${cat.items.length}</span>
        </div>
        <svg class="cat-chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="cat-body">
        ${cat.items.map(it => renderItem(it)).join('')}
      </div>`;
    el.appendChild(div);
  });
}

function renderItem(it) {
  const myStatus = myState.items[it.id] || null;

  // Collect other testers for this item
  const okTesters = allTesters
    .filter(t => t.name !== myState.name && t.items[it.id] === 'ok')
    .map(t => t.name);
  const issueTesters = allTesters
    .filter(t => t.name !== myState.name && t.items[it.id] === 'issue')
    .map(t => t.name);

  const testerHTML = [
    ...okTesters.map(n => `<div class="tester-tag ok"><div class="dot-ok"></div>${esc(n)}</div>`),
    ...issueTesters.map(n => `<div class="tester-tag issue"><div class="dot-issue"></div>${esc(n)}</div>`),
  ].join('');

  const btnClass = myStatus === 'ok' ? 'ok' : myStatus === 'issue' ? 'issue' : '';

  return `
    <div class="item" id="item_${it.id}">
      <div class="item-left" onclick="cycleStatus('${it.id}')">
        <button class="status-btn ${btnClass}" tabindex="-1">
          <svg class="check" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <div class="dot"></div>
        </button>
        <div class="item-text">
          <div class="item-title">${it.title}</div>
        </div>
      </div>
      <div class="item-testers" id="testers_${it.id}">${testerHTML}</div>
    </div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCat(id) {
  document.getElementById('cat_' + id)?.classList.toggle('open');
}

// ─── CYCLE STATUS ─────────────────────────────────────────────────────────────
// null → 'ok' → 'issue' → null
function cycleStatus(id) {
  const cur = myState.items[id] || null;
  const next = cur === null ? 'ok' : cur === 'ok' ? 'issue' : null;
  if (next === null) delete myState.items[id];
  else myState.items[id] = next;
  saveLocal();

  // Update item DOM without full re-render
  updateItemDOM(id);
  updateCatStat(id);
  schedulePush();
}

function updateItemDOM(id) {
  const el = document.getElementById('item_' + id);
  if (!el) return;
  const btn = el.querySelector('.status-btn');
  if (!btn) return;
  const status = myState.items[id] || null;
  btn.className = 'status-btn' + (status === 'ok' ? ' ok' : status === 'issue' ? ' issue' : '');
}

function updateCatStat(itemId) {
  const cat = CATS.find(c => c.items.some(i => i.id === itemId));
  if (!cat) return;
  const el = document.getElementById('cat_' + cat.id);
  if (!el) return;
  const stat = el.querySelector('.cat-stat span');
  if (!stat) return;
  const done = cat.items.filter(it => myState.items[it.id]).length;
  stat.textContent = done + '/' + cat.items.length;
  stat.style.color = done === cat.items.length && done > 0 ? '#16A34A' : 'var(--muted)';
}

// ─── SYNC ────────────────────────────────────────────────────────────────────
let pushTimer = null;
function schedulePush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushData, 1500);
}

async function pushData() {
  const name = myState.name.trim();
  if (!name) return;
  setSyncStatus('syncing', 'Wird gespeichert…');
  try {
    await fetch('/api/beta-test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, items: myState.items }),
    });
    setSyncStatus('synced', 'Gespeichert ✓');
  } catch {
    setSyncStatus('', 'Konnte nicht speichern');
  }
}

async function fetchAll() {
  try {
    const res = await fetch('/api/beta-test?_=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    allTesters = data.testers || [];
    // Update tester tags without full re-render
    CATS.flatMap(c => c.items).forEach(it => {
      const el = document.getElementById('testers_' + it.id);
      if (!el) return;
      const okTesters = allTesters.filter(t => t.name !== myState.name && t.items[it.id] === 'ok').map(t => t.name);
      const issTesters = allTesters.filter(t => t.name !== myState.name && t.items[it.id] === 'issue').map(t => t.name);
      el.innerHTML = [
        ...okTesters.map(n => `<div class="tester-tag ok"><div class="dot-ok"></div>${esc(n)}</div>`),
        ...issTesters.map(n => `<div class="tester-tag issue"><div class="dot-issue"></div>${esc(n)}</div>`),
      ].join('');
    });
    const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    setSyncStatus('synced', 'Aktualisiert um ' + now);
  } catch {}
}

function setSyncStatus(cls, txt) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync ' + cls;
  el.textContent = txt;
}

// ─── SUBMIT (manual) ─────────────────────────────────────────────────────────
async function submitResults() {
  const name = myState.name.trim();
  if (!name) { showToast('Bitte erst deinen Namen eingeben!'); return; }
  await pushData();
  showToast('Ergebnisse übermittelt – danke! 🎉');
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadLocal();
  render();
  fetchAll();

  const input = document.getElementById('testerName');
  input.value = myState.name || '';
  input.addEventListener('input', () => {
    myState.name = input.value;
    saveLocal();
    schedulePush();
  });

  // Poll for updates every 30s
  setInterval(fetchAll, 30000);
});
</script>
</body>
</html>
