name = "finestsites-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "bc6cb133755178f3e44ca3e2662d1242"
workers_dev = true

# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE DOMAINS — Worker Routes
#
# WICHTIG: Jede Template-Domain MUSS hier als Route eingetragen sein.
# wrangler deploy überschreibt alle Worker Routes autoritativ — ein Eintrag
# nur im CF Dashboard wird beim nächsten Deploy gelöscht!
#
# Checkliste für neue Template-Domain:
#   1. DNS: Proxied Wildcard-A-Record  *.domain.tld → 192.0.2.1  im CF Dashboard
#   2. Route hier hinzufügen (zone_id aus CF Dashboard → Overview → Zone ID)
#   3. wrangler deploy ausführen
#   4. Testen: curl https://test.domain.tld/.finestsites/health → 200
# ──────────────────────────────────────────────────────────────────────────────

# Subdomain traffic: username.womenplus.io
[[routes]]
pattern = "*.womenplus.io/*"
zone_id = "6e299b7d60fc54649cc64f9106fe1d57"

# Subdomain traffic: username.myevnt.io
[[routes]]
pattern = "*.myevnt.io/*"
zone_id = "002cfbc8b4c01a51758357b3dfb1c123"

# Subdomain traffic: username.lnko.me
[[routes]]
pattern = "*.lnko.me/*"
zone_id = "93a630fa5da1056d92657e2e35a6c8f1"

# Subdomain traffic: username.dailyoptimal.de
# Zone: 90e5c504e63e834339109d3f19213bb0
# DNS: *.dailyoptimal.de → 192.0.2.1 (proxied, Wildcard-A)
[[routes]]
pattern = "*.dailyoptimal.de/*"
zone_id = "90e5c504e63e834339109d3f19213bb0"

# ──────────────────────────────────────────────────────────────────────────────
# CF for SaaS (custom user domains, z.B. www.kundenname.de)
#
# Architektur:
#   www.kundenname.de  →  CNAME  →  custom.womenplus.io
#   custom.womenplus.io  →  CF for SaaS (womenplus.io Zone)
#   CF for SaaS Fallback Origin: custom.womenplus.io (A → 192.0.2.1, proxied)
#   Worker Route *.womenplus.io/*  fängt den Request ab
#   Worker liest Host-Header → schlägt KV nach custom:{hostname} auf
# ──────────────────────────────────────────────────────────────────────────────

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "finestsites-templates"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "d59a4cba067147dc8db48fdd7b4d39e3"

[vars]
APP_URL = "https://app.finestsites.io"
